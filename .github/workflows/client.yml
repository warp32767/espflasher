name: client

on:
  workflow_dispatch:
  push:
    tags:
      - "client-v*"

permissions:
  contents: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            exe: picoclient
            out_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            exe: picoclient.exe
            out_ext: ".exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            exe: picoclient
            out_ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            exe: picoclient
            out_ext: ""

    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: client -> target

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.exe }}" "dist/picoclient-${{ matrix.target }}${{ matrix.out_ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: picoclient-${{ matrix.target }}
          path: client/dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/client-v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List artifacts
        run: find dist -type f -maxdepth 3 -print

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
